<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Auth Decision Tree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --bg-card: #FFFFFF;
    --bg-secondary: #F3F2EE;
    --bg-info: #E6F1FB;
    --bg-success: #EAF3DE;
    --bg-warning: #FAEEDA;
    --text-primary: #1A1A18;
    --text-secondary: #6B6A65;
    --text-tertiary: #9C9B96;
    --text-info: #185FA5;
    --text-success: #3B6D11;
    --text-warning: #854F0B;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.16);
    --border-info: #85B7EB;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161615;
      --bg-card: #1E1E1C;
      --bg-secondary: #2A2A27;
      --bg-info: #0C2D4F;
      --bg-success: #1A2E0A;
      --bg-warning: #2E1E06;
      --text-primary: #E8E6DF;
      --text-secondary: #9C9B96;
      --text-tertiary: #6B6A65;
      --text-info: #85B7EB;
      --text-success: #97C459;
      --text-warning: #FAC775;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --border-info: #378ADD;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
    -webkit-font-smoothing: antialiased;
  }
  page-container { display: block; max-width: 640px; margin: 0 auto; }
  page-header {
    display: block;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  header-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-info);
    background: var(--bg-info);
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  page-header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.25;
    margin-bottom: 6px;
  }
  page-header p {
    font-size: 0.875rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  question-card {
    display: block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 12px;
    transition: opacity 0.3s ease;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  question-card[past] { opacity: 0.45; cursor: pointer; }
  question-card[past]:hover { opacity: 0.7; }
  step-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  question-card:not([past]) step-badge {
    background: var(--bg-info);
    color: var(--text-info);
  }
  q-text {
    display: block;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  q-hint {
    display: block;
    font-size: 0.8125rem;
    color: var(--text-tertiary);
    margin-bottom: 14px;
    line-height: 1.45;
  }
  q-text + option-list { margin-top: 14px; }
  option-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt-btn {
    background: var(--bg-secondary);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    font-size: 0.875rem;
    font-family: var(--font);
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.15s ease;
    line-height: 1.35;
  }
  .opt-btn:hover { border-color: var(--border-hover); background: var(--bg-card); }
  .opt-btn:active { transform: scale(0.98); }
  .opt-btn[selected] {
    background: var(--bg-info);
    color: var(--text-info);
    border-color: var(--border-info);
    font-weight: 500;
  }
  result-card {
    display: block;
    background: var(--bg-card);
    border: 2px solid var(--border-info);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-top: 4px;
    animation: slideIn 0.35s ease;
  }
  result-label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-info);
    margin-bottom: 8px;
  }
  result-title {
    display: block;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  result-desc {
    display: block;
    font-size: 0.875rem;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 14px;
  }
  tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
  auth-tag {
    font-size: 0.75rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 4px;
  }
  auth-tag[pro] { background: var(--bg-success); color: var(--text-success); }
  auth-tag[con] { background: var(--bg-warning); color: var(--text-warning); }
  card-actions { display: flex; margin-top: 1.25rem; gap: 12px; flex-wrap: wrap; }
  .reset-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-size: 0.8125rem;
    font-family: var(--font);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
  bread-crumb {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    margin-bottom: 1rem;
    min-height: 24px;
  }
  crumb-item {
    font-size: 0.75rem;
    color: var(--text-tertiary);
    font-family: var(--mono);
  }
  crumb-item[active] { color: var(--text-info); }
  crumb-sep { font-size: 0.7rem; color: var(--text-tertiary); opacity: 0.5; }
</style>
</head>
<body>
<page-container>
  <page-header>
    <header-tag>Decision tree</header-tag>
    <h1>Choosing the right API auth</h1>
    <p>Answer a few questions about your setup to get a tailored recommendation. Click any past step to rewind and explore a different branch.</p>
  </page-header>
  <bread-crumb id="breadcrumb"></bread-crumb>
  <div id="tree"></div>
</page-container>

<script src="decision-tree.js"></script>
<script src="ui.js"></script>
</body>
</html>
