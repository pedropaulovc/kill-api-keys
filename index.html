<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Auth Decision Tree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --bg-card: #FFFFFF;
    --bg-secondary: #F3F2EE;
    --bg-info: #E6F1FB;
    --bg-success: #EAF3DE;
    --bg-warning: #FAEEDA;
    --text-primary: #1A1A18;
    --text-secondary: #6B6A65;
    --text-tertiary: #9C9B96;
    --text-info: #185FA5;
    --text-success: #3B6D11;
    --text-warning: #854F0B;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.16);
    --border-info: #85B7EB;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161615;
      --bg-card: #1E1E1C;
      --bg-secondary: #2A2A27;
      --bg-info: #0C2D4F;
      --bg-success: #1A2E0A;
      --bg-warning: #2E1E06;
      --text-primary: #E8E6DF;
      --text-secondary: #9C9B96;
      --text-tertiary: #6B6A65;
      --text-info: #85B7EB;
      --text-success: #97C459;
      --text-warning: #FAC775;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --border-info: #378ADD;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 640px; margin: 0 auto; }
  .header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .header-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-info);
    background: var(--bg-info);
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 0.875rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 12px;
    transition: opacity 0.3s ease;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .question-card.past { opacity: 0.45; cursor: pointer; }
  .question-card.past:hover { opacity: 0.7; }
  .step-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .question-card:not(.past) .step-badge {
    background: var(--bg-info);
    color: var(--text-info);
  }
  .q-text {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .q-hint {
    font-size: 0.8125rem;
    color: var(--text-tertiary);
    margin-bottom: 14px;
    line-height: 1.45;
  }
  .q-text + .options { margin-top: 14px; }
  .options { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt-btn {
    background: var(--bg-secondary);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    font-size: 0.875rem;
    font-family: var(--font);
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.15s ease;
    line-height: 1.35;
  }
  .opt-btn:hover { border-color: var(--border-hover); background: var(--bg-card); }
  .opt-btn:active { transform: scale(0.98); }
  .opt-btn.selected {
    background: var(--bg-info);
    color: var(--text-info);
    border-color: var(--border-info);
    font-weight: 500;
  }
  .result-card {
    background: var(--bg-card);
    border: 2px solid var(--border-info);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-top: 4px;
    animation: slideIn 0.35s ease;
  }
  .result-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-info);
    margin-bottom: 8px;
  }
  .result-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .result-desc {
    font-size: 0.875rem;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 0.75rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .tag.pro { background: var(--bg-success); color: var(--text-success); }
  .tag.con { background: var(--bg-warning); color: var(--text-warning); }
  .actions { margin-top: 1.25rem; display: flex; gap: 12px; flex-wrap: wrap; }
  .reset-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-size: 0.8125rem;
    font-family: var(--font);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .breadcrumb {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    margin-bottom: 1rem;
    min-height: 24px;
  }
  .crumb {
    font-size: 0.75rem;
    color: var(--text-tertiary);
    font-family: var(--mono);
  }
  .crumb.active { color: var(--text-info); }
  .crumb-sep { font-size: 0.7rem; color: var(--text-tertiary); opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-tag">Decision tree</div>
    <h1>Choosing the right API auth</h1>
    <p>Answer a few questions about your setup to get a tailored recommendation. Click any past step to rewind and explore a different branch.</p>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="tree"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     DATA — Edit questions, options, and results here.
     ═══════════════════════════════════════════════════════════════ -->
<script>
const allNodes = {

  // ── Root: developer vs consumer ──
  root: {
    question: "What is your role?",
    step: 1,
    options: [
      { label: "API developer \u2014 I\u2019m building the API", next: "dev_caller" },
      { label: "API consumer \u2014 I\u2019m integrating with an API", next: "con_type" }
    ]
  },

  // ══════════════════════════════════════════════════════════════
  //  DEVELOPER PATH \u2014 choosing what auth to implement
  // ══════════════════════════════════════════════════════════════

  dev_caller: {
    question: "Who or what is making the request?",
    step: 2,
    options: [
      { label: "End user (human via browser/app)", next: "user_auth_server" },
      { label: "Another service (machine-to-machine)", next: "m2m_env" },
      { label: "Webhook / event push from a provider", next: "webhook_result" },
      { label: "Temporary / scoped resource access", next: "signed_url_result" }
    ]
  },
  user_auth_server: {
    question: "Do you have (or can you set up) an authorization server or identity provider?",
    hint: "e.g. Auth0, Okta, Keycloak, AWS Cognito, Azure AD, or a custom OAuth server",
    step: 3,
    options: [
      { label: "Yes, we have one", next: "user_trust" },
      { label: "We can adopt one", next: "user_trust" },
      { label: "No, and we want to avoid one", next: "user_no_authserver" }
    ]
  },
  user_trust: {
    question: "Do you need to know the user\u2019s identity, or just that they\u2019re authorized?",
    step: 4,
    options: [
      { label: "Need identity (who they are)", next: "user_identity_method" },
      { label: "Just authorization (what they can do)", next: "oauth_result" }
    ]
  },
  user_identity_method: {
    question: "How should the user authenticate?",
    step: 5,
    options: [
      { label: "Federated SSO (Google, Microsoft, etc.)", next: "oidc_result" },
      { label: "Enterprise SSO (existing IdP)", next: "saml_or_oidc" },
      { label: "Passwordless / phishing-resistant", next: "passkey_result" }
    ]
  },
  saml_or_oidc: {
    question: "Does the enterprise IdP support modern protocols?",
    step: 6,
    options: [
      { label: "Yes, supports OIDC", next: "oidc_result" },
      { label: "Legacy IdP (SAML only)", next: "saml_result" }
    ]
  },
  user_no_authserver: {
    question: "What level of security do you need?",
    hint: "Without an auth server you lose centralized token management, but simpler options exist",
    step: 4,
    options: [
      { label: "Strong (phishing-resistant, no passwords)", next: "passkey_result" },
      { label: "Moderate (signed tokens, self-issued)", next: "jwt_self_result" },
      { label: "Basic (HTTP signatures per request)", next: "http_sig_result" }
    ]
  },
  m2m_env: {
    question: "Where does the calling service run?",
    step: 3,
    options: [
      { label: "Same cloud provider (AWS/GCP/Azure)", next: "m2m_same_cloud" },
      { label: "Same Kubernetes cluster", next: "m2m_k8s" },
      { label: "Cross-cloud or on-prem", next: "m2m_cross" },
      { label: "Anywhere / external partner", next: "m2m_external" }
    ]
  },
  m2m_same_cloud: {
    question: "Can you use the cloud provider\u2019s native identity system?",
    step: 4,
    options: [
      { label: "Yes, workloads run on managed compute", next: "workload_identity_result" },
      { label: "No, custom infrastructure", next: "m2m_authserver" }
    ]
  },
  m2m_k8s: {
    question: "Do you have a service mesh installed?",
    step: 4,
    options: [
      { label: "Yes (Istio, Linkerd, Consul Connect)", next: "service_mesh_result" },
      { label: "No mesh, but want crypto identity", next: "spiffe_result" },
      { label: "No, keep it simple", next: "m2m_authserver" }
    ]
  },
  m2m_cross: {
    question: "Is strong transport-level identity important?",
    step: 4,
    options: [
      { label: "Yes, need mutual authentication", next: "mtls_result" },
      { label: "Token-based is fine", next: "m2m_authserver" }
    ]
  },
  m2m_external: {
    question: "How sensitive is the communication?",
    step: 4,
    options: [
      { label: "High (financial, regulated)", next: "mtls_dpop_result" },
      { label: "Medium (standard APIs)", next: "m2m_authserver" },
      { label: "Low (internal tools, scripts)", next: "m2m_no_authserver" }
    ]
  },
  m2m_authserver: {
    question: "Do you have an authorization server that both sides (caller and receiver) can trust?",
    hint: "OAuth Client Credentials requires a shared auth server. This is easy within one org (e.g. Auth0, Okta, Keycloak, Cognito) but harder across org boundaries.",
    step: 5,
    options: [
      { label: "Yes, shared auth server", next: "client_creds_result" },
      { label: "We have separate auth servers per org", next: "m2m_cross_org" },
      { label: "No auth server / want to avoid one", next: "m2m_no_authserver" }
    ]
  },
  m2m_cross_org: {
    question: "Can you federate the auth servers, or do you need a standalone solution?",
    hint: "Token exchange (RFC 8693) can bridge trust domains, or you can skip the auth server entirely",
    step: 6,
    options: [
      { label: "Federate via token exchange", next: "token_exchange_result" },
      { label: "Skip auth servers, use crypto identity", next: "m2m_no_authserver_cross_org" }
    ]
  },
  m2m_no_authserver_cross_org: {
    question: "What fits your cross-org setup best?",
    hint: "These options authenticate via out-of-band key exchange \u2014 no shared auth server needed",
    step: 7,
    options: [
      { label: "Certificate-based (mTLS)", next: "mtls_result" },
      { label: "Self-issued signed JWTs", next: "jwt_self_result" },
      { label: "HTTP request signatures (RFC 9421)", next: "http_sig_result" }
    ]
  },
  m2m_no_authserver: {
    question: "What fits your setup best?",
    hint: "These options don\u2019t require a centralized authorization server",
    step: 6,
    options: [
      { label: "Certificate-based (mTLS)", next: "mtls_result" },
      { label: "Self-issued signed JWTs", next: "jwt_self_result" },
      { label: "HTTP request signatures (RFC 9421)", next: "http_sig_result" },
      { label: "Macaroons (attenuable tokens)", next: "macaroon_result" }
    ]
  },

  // ══════════════════════════════════════════════════════════════
  //  CONSUMER PATH \u2014 waterfall from best to worst
  // ══════════════════════════════════════════════════════════════

  con_type: {
    question: "What kind of integration is this?",
    step: 2,
    options: [
      { label: "User-facing (browser/app calls the API on behalf of a user)", next: "con_u_oidc" },
      { label: "Service-to-service (my backend calls their API)", next: "con_m_cloud" },
      { label: "Receiving webhooks from the API provider", next: "con_webhook_result" }
    ]
  },

  // \u2500\u2500 Consumer: user-facing waterfall (best \u2192 worst) \u2500\u2500
  con_u_oidc: {
    question: "Does the API support OAuth 2.0 / OpenID Connect?",
    hint: "Best option \u2014 short-lived tokens, scoped access, identity via ID tokens. Look for an /authorize or /token endpoint in their docs.",
    step: 3,
    options: [
      { label: "Yes", next: "con_u_oidc_result" },
      { label: "No / not sure", next: "con_u_passkey" }
    ]
  },
  con_u_passkey: {
    question: "Does the API support passkeys / WebAuthn?",
    hint: "Phishing-resistant, no passwords. Less common for APIs but growing in developer portals.",
    step: 4,
    options: [
      { label: "Yes", next: "con_u_passkey_result" },
      { label: "No", next: "con_u_jwt" }
    ]
  },
  con_u_jwt: {
    question: "Does the API accept signed JWTs (e.g. service account or client assertion)?",
    hint: "You sign a JWT with your private key; they verify it. No shared secret transmitted.",
    step: 5,
    options: [
      { label: "Yes", next: "con_u_jwt_result" },
      { label: "No", next: "con_u_apikey" }
    ]
  },
  con_u_apikey: {
    question: "Does the API use static API keys?",
    hint: "Common but weakest option \u2014 long-lived shared secret, no scoping, hard to rotate.",
    step: 6,
    options: [
      { label: "Yes, API keys only", next: "con_u_apikey_result" },
      { label: "No, or unclear what they support", next: "con_u_fallback_result" }
    ]
  },

  // ── Consumer: M2M waterfall (best → worst) ──
  // Tier 1: no secrets at all (workload identity / OIDC federation)
  // Tier 2: crypto identity with secrets to manage (mTLS)
  // Tier 3: token-based (OAuth CC, JWT, HTTP sig)
  // Tier 4: static secrets (API keys)
  con_m_cloud: {
    question: "Are you and the API provider on the same cloud platform?",
    hint: "Both workload identity (same cloud) and OIDC federation (cross-cloud) are the best M2M options \u2014 zero secrets to manage.",
    step: 3,
    options: [
      { label: "Yes, same cloud (AWS/GCP/Azure)", next: "con_m_workload" },
      { label: "No, different clouds or on-prem", next: "con_m_oidc_fed" }
    ]
  },
  con_m_workload: {
    question: "Does the API accept workload identity credentials (IAM roles, managed identity)?",
    hint: "Best M2M option \u2014 the cloud injects short-lived credentials automatically. Zero secrets, zero config beyond IAM. E.g. AWS IAM role assumption, GCP service account impersonation, Azure managed identity.",
    step: 4,
    options: [
      { label: "Yes", next: "con_m_workload_result" },
      { label: "No", next: "con_m_oidc_fed" }
    ]
  },
  con_m_oidc_fed: {
    question: "Does the API accept OIDC tokens from your identity provider (workload identity federation)?",
    hint: "As strong as workload identity but cross-cloud. Your IdP issues an OIDC token, the API provider\u2019s platform trusts it via federation. No shared secrets \u2014 just one-time trust configuration on both sides. E.g. GCP Workload Identity Federation, AWS STS AssumeRoleWithWebIdentity, Azure federated credentials.",
    step: 5,
    options: [
      { label: "Yes", next: "con_m_oidc_fed_result" },
      { label: "No", next: "con_m_mtls" }
    ]
  },
  con_m_mtls: {
    question: "Does the API support mutual TLS (mTLS)?",
    hint: "Strong crypto identity at transport layer, but requires managing certificates (issuance, rotation, revocation). A step down from workload identity because you have secrets (certs) to manage.",
    step: 6,
    options: [
      { label: "Yes", next: "con_m_mtls_result" },
      { label: "No", next: "con_m_oauth" }
    ]
  },
  con_m_oauth: {
    question: "Does the API support OAuth 2.0 Client Credentials?",
    hint: "You authenticate with client ID + secret (or certificate) to get short-lived tokens. Both sides must trust the same auth server.",
    step: 7,
    options: [
      { label: "Yes", next: "con_m_oauth_result" },
      { label: "No", next: "con_m_jwt" }
    ]
  },
  con_m_jwt: {
    question: "Does the API accept signed JWTs or HTTP signatures?",
    hint: "You sign requests or tokens with your private key; they verify against your public key.",
    step: 8,
    options: [
      { label: "Yes, signed JWTs", next: "con_m_jwt_result" },
      { label: "Yes, HTTP signatures (RFC 9421)", next: "con_m_httpsig_result" },
      { label: "No", next: "con_m_apikey" }
    ]
  },
  con_m_apikey: {
    question: "Does the API use static API keys or shared secrets?",
    hint: "Common but weakest option \u2014 long-lived shared secret, no scoping, hard to rotate.",
    step: 9,
    options: [
      { label: "Yes, API keys only", next: "con_m_apikey_result" },
      { label: "No, or unclear what they support", next: "con_m_fallback_result" }
    ]
  }
};

const results = {

  // ── Developer path results (unchanged) ──
  oauth_result: {
    title: "OAuth 2.0 (Authorization Code + PKCE)",
    desc: "Delegated authorization via short-lived access tokens. The user authenticates with the IdP; your service receives scoped tokens without ever seeing credentials.",
    pros: ["Scoped access", "Token revocation", "Ecosystem support"],
    cons: ["Requires auth server", "Complex flows"]
  },
  oidc_result: {
    title: "OpenID Connect (OIDC)",
    desc: "Identity layer on OAuth 2.0. Provides a signed ID token (JWT) with user identity claims, plus an access token for API calls. The standard behind \u2018Sign in with Google\u2019.",
    pros: ["Standardized identity", "JWT-based", "Wide IdP support"],
    cons: ["Requires auth server", "Token size can grow"]
  },
  saml_result: {
    title: "SAML 2.0",
    desc: "XML-based federated identity for enterprise SSO. The IdP issues signed assertions the service provider validates. Mature but verbose compared to OIDC.",
    pros: ["Enterprise standard", "Mature ecosystem"],
    cons: ["XML complexity", "Being superseded by OIDC"]
  },
  passkey_result: {
    title: "FIDO2 / WebAuthn / Passkeys",
    desc: "Public-key authentication backed by hardware or platform authenticators. No passwords, no shared secrets, no phishing. Works without a traditional auth server.",
    pros: ["Phishing-resistant", "No shared secrets", "No auth server needed"],
    cons: ["Browser/platform dependent", "Recovery flows needed"]
  },
  workload_identity_result: {
    title: "Cloud workload identity (IAM roles / managed identity)",
    desc: "The cloud provider automatically injects short-lived credentials into your workload. No secrets to manage \u2014 identity comes from the infrastructure. AWS IAM Roles, GCP Workload Identity, Azure Managed Identity.",
    pros: ["Zero secrets", "Auto-rotation", "Native integration"],
    cons: ["Cloud vendor lock-in", "Single-cloud only"]
  },
  service_mesh_result: {
    title: "Service mesh (auto mTLS)",
    desc: "The mesh sidecar handles mTLS between all services transparently. Your application code doesn\u2019t touch auth \u2014 identity, encryption, and policy are infrastructure concerns.",
    pros: ["Zero app changes", "Automatic mTLS", "Declarative policy"],
    cons: ["Operational complexity", "Resource overhead"]
  },
  spiffe_result: {
    title: "SPIFFE / SPIRE",
    desc: "Standardized cryptographic service identity. SPIRE automatically issues and rotates X.509 or JWT identity documents (SVIDs) to workloads. Works across platforms.",
    pros: ["Platform-agnostic", "Auto-rotation", "No auth server needed"],
    cons: ["Requires SPIRE deployment", "Smaller ecosystem"]
  },
  mtls_result: {
    title: "Mutual TLS (mTLS)",
    desc: "Both client and server present X.509 certificates during the TLS handshake. Strong cryptographic identity at the transport layer. No shared auth server needed \u2014 just exchange trusted CA certs out of band.",
    pros: ["Strong identity", "Transport-level", "No auth server needed"],
    cons: ["Certificate lifecycle mgmt", "Complex PKI"]
  },
  mtls_dpop_result: {
    title: "mTLS + DPoP (proof-of-possession)",
    desc: "For high-security scenarios: mTLS at transport layer plus OAuth with DPoP tokens cryptographically bound to the client. Even stolen tokens can\u2019t be replayed.",
    pros: ["Strongest security", "Replay-proof", "Regulatory compliance"],
    cons: ["Most complex setup", "Limited library support"]
  },
  client_creds_result: {
    title: "OAuth 2.0 Client Credentials",
    desc: "The calling service authenticates with its own client ID and secret (or certificate) to get a short-lived access token. Both caller and receiver must trust the same authorization server for token issuance and validation.",
    pros: ["Standard flow", "Scoped tokens", "Revocable"],
    cons: ["Requires shared auth server", "Client secret mgmt"]
  },
  token_exchange_result: {
    title: "Token exchange (RFC 8693) / federation",
    desc: "Bridges trust between separate authorization servers. The caller obtains a token from their own IdP, then exchanges it at the receiver\u2019s auth server for a locally valid token. Each org keeps its own auth server; federation handles the trust boundary.",
    pros: ["Cross-org compatible", "Each org keeps own IdP", "Standards-based"],
    cons: ["Complex setup", "Both sides must support RFC 8693", "Latency from double token flow"]
  },

<!-- ═══════════════════════════════════════════════════════════════
     UI — Rendering logic. Reads from allNodes and results above.
     ═══════════════════════════════════════════════════════════════ -->
<script>
let path = [];

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (path.length === 0) { bc.innerHTML = ''; return; }
  let html = '<span class="crumb">Start</span>';
  path.forEach((entry, i) => {
    const node = allNodes[entry.nodeId];
    const chosen = node.options.find(o => o.next === entry.chosenNext);
    const isLast = i === path.length - 1;
    const short = chosen ? (chosen.label.length > 28 ? chosen.label.substring(0, 26) + '\u2026' : chosen.label) : '';
    html += '<span class="crumb-sep">\u203A</span><span class="crumb' + (isLast ? ' active' : '') + '">' + short + '</span>';
  });
  bc.innerHTML = html;
}

function render() {
  const container = document.getElementById('tree');
  let html = '';

  path.forEach((entry, i) => {
    const node = allNodes[entry.nodeId];
    const chosen = node.options.find(o => o.next === entry.chosenNext);
    html += '<div class="question-card past" onclick="rewindTo(' + i + ')">';
    html += '<div class="step-badge">' + node.step + '</div>';
    html += '<div class="q-text">' + node.question + '</div>';
    if (node.hint) html += '<div class="q-hint">' + node.hint + '</div>';
    html += '<div class="options">';
    node.options.forEach(o => {
      html += '<div class="opt-btn' + (o === chosen ? ' selected' : '') + '">' + o.label + '</div>';
    });
    html += '</div></div>';
  });

  const lastChoice = path.length > 0 ? path[path.length - 1] : null;
  const currentNextId = lastChoice ? lastChoice.chosenNext : null;

  if (currentNextId && results[currentNextId]) {
    const r = results[currentNextId];
    html += '<div class="result-card">';
    html += '<div class="result-label">Recommendation</div>';
    html += '<div class="result-title">' + r.title + '</div>';
    html += '<div class="result-desc">' + r.desc + '</div>';
    html += '<div class="tag-row">';
    r.pros.forEach(p => { html += '<span class="tag pro">' + p + '</span>'; });
    r.cons.forEach(c => { html += '<span class="tag con">' + c + '</span>'; });
    html += '</div>';
    if (r.ask) {
      html += '<div style="margin-top:16px;padding:12px 14px;background:var(--bg-info);border-radius:var(--radius-sm);font-size:0.8125rem;line-height:1.55;color:var(--text-info);">';
      html += '<strong style="display:block;margin-bottom:4px;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;opacity:0.8;">What to ask the API provider</strong>';
      html += r.ask;
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="actions"><button class="reset-btn" onclick="resetTree()">Start over</button></div>';
  } else if (path.length === 0) {
    html += renderQuestion('root');
  } else if (currentNextId && allNodes[currentNextId]) {
    html += renderQuestion(currentNextId);
  }

  container.innerHTML = html;
  renderBreadcrumb();
}

function renderQuestion(nodeId) {
  const node = allNodes[nodeId];
  let html = '<div class="question-card">';
  html += '<div class="step-badge">' + node.step + '</div>';
  html += '<div class="q-text">' + node.question + '</div>';
  if (node.hint) html += '<div class="q-hint">' + node.hint + '</div>';
  html += '<div class="options">';
  node.options.forEach(o => {
    html += '<button class="opt-btn" onclick="choose(\'' + nodeId + '\',\'' + o.next + '\')">' + o.label + '</button>';
  });
  html += '</div></div>';
  return html;
}

function choose(nodeId, next) {
  path.push({ nodeId: nodeId, chosenNext: next });
  render();
}

function rewindTo(index) {
  path = path.slice(0, index);
  render();
}

function resetTree() {
  path = [];
  render();
}

render();
</script>
</body>
</html>
