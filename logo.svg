<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320" width="180" height="320">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="70%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <linearGradient id="drip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="80%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#EF5350" stop-opacity="0"/>
    </linearGradient>
    <!-- Mask to punch out the keyhole -->
    <mask id="head-mask">
      <rect width="180" height="320" fill="white"/>
      <circle cx="90" cy="64" r="18" fill="black"/>
    </mask>
  </defs>

  <g mask="url(#head-mask)">
    <!-- Key bow (head) -->
    <circle cx="90" cy="64" r="48" fill="url(#body)"/>

    <!-- Shaft -->
    <rect x="76" y="108" width="28" height="92" fill="url(#body)"/>

    <!-- Tooth 1 (top, solid) -->
    <rect x="104" y="148" width="24" height="14" rx="2" fill="url(#body)"/>

    <!-- Tooth 2 (middle, starting to soften) -->
    <path d="M104,174 h20 q4,0 4,4 l-2,10 q-2,4 -6,4 h-16 Z" fill="url(#body)"/>

    <!-- Shaft bottom melting into drips -->
    <path d="
      M76,196
      q0,10 -2,22
      q-3,16 -2,28
      q1,10 4,10
      q3,0 4,-10
      q1,-12 2,-20

      q2,18 4,30
      q2,12 5,12
      q3,0 4,-12
      q1,-14 0,-26

      q2,20 4,34
      q2,14 5,14
      q3,0 4,-14
      q1,-16 -1,-30

      q2,16 4,28
      q3,16 6,16
      q3,0 3,-12
      q0,-10 -3,-24
      q-3,-16 -3,-30
      q0,-8 -1,-16
      l0,-4
      Z
    " fill="url(#drip)"/>
  </g>

  <!-- Drip from bow (left side) -->
  <ellipse cx="54" cy="104" rx="4" ry="3" fill="#E53935"/>
  <path d="M50,104 q0,12 -2,24 q-2,14 0,22 q2,6 6,6 q4,0 5,-8 q1,-12 -1,-24 q-1,-10 -2,-20 Z" fill="url(#drip)"/>

  <!-- Drip from bow (right side) -->
  <ellipse cx="126" cy="104" rx="3.5" ry="2.5" fill="#E53935"/>
  <path d="M122.5,104 q0,8 -1,18 q-1,12 0,18 q1,5 5,5 q3,0 4,-6 q1,-10 0,-18 q-1,-8 -1,-17 Z" fill="url(#drip)"/>
</svg>
